<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabby&#039;s Dollhouse Matching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fad1ff;
            --heading: #ef0fff;
            --heading-text: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 16px 16px, color-mix(in srgb, var(--heading) 10%, transparent) 2px, transparent 0);
            background-size: 44px 44px;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-1.5deg); }
            40% { transform: translateX(8px) rotate(1.5deg); }
            60% { transform: translateX(-8px) rotate(-1.5deg); }
            80% { transform: translateX(8px) rotate(1.5deg); }
        }
        @keyframes popIn {
            0% { transform: scale(0.75); opacity: 0; }
            80% { transform: scale(1.04); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-shake { animation: shake 0.42s ease-in-out; }
        .animate-pop { animation: popIn 0.32s ease-out both; }
        .theme-bg { background: var(--heading); color: var(--heading-text); }
        .theme-border { border-color: var(--heading); }
        .theme-text { color: var(--heading); }
        .stat-pill {
            background: rgba(255,255,255,0.93);
            border: 2px solid rgba(255,255,255,0.45);
            color: #273043;
            border-radius: 999px;
            padding: 0.55rem 0.9rem;
            font-weight: 900;
            box-shadow: 0 8px 18px rgba(0,0,0,0.07);
        }
        .game-card {
            min-height: 150px;
            border: 4px solid #d8dee9;
            border-radius: 1.35rem;
            background: #ffffff;
            box-shadow: 0 12px 22px rgba(15, 23, 42, 0.10);
            transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, background-color 0.14s ease;
            cursor: pointer;
            user-select: none;
            overflow: hidden;
        }
        .game-card:hover:not(.matched) { transform: translateY(-3px); box-shadow: 0 16px 30px rgba(15, 23, 42, 0.14); }
        .game-card.selected {
            border-color: var(--heading);
            box-shadow: 0 0 0 7px color-mix(in srgb, var(--heading) 24%, transparent), 0 16px 30px rgba(15, 23, 42, 0.12);
            transform: translateY(-2px) scale(1.02);
        }
        .game-card.matched {
            border-color: #22c55e;
            background: #ecfdf5;
            cursor: default;
            opacity: 0.94;
        }
        .game-card.wrong { border-color: #ef4444; }
        .card-inner {
            height: 100%;
            min-height: 150px;
            padding: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .card-text {
            font-size: clamp(0.95rem, 2.5vw, 1.35rem);
            line-height: 1.16;
            font-weight: 900;
            color: #1f2937;
            overflow-wrap: anywhere;
        }
        .card-image {
            width: 100%;
            height: 132px;
            object-fit: contain;
            border-radius: 1rem;
            background: #f8fafc;
        }
        @media (min-width: 768px) {
            .game-card { min-height: 174px; }
            .card-inner { min-height: 174px; }
            .card-image { height: 150px; }
        }
        .modal-backdrop {
            background: rgba(15, 23, 42, 0.66);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 flex flex-col">
    <header class="theme-bg shadow-xl border-b-4 border-white/25 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto p-4 md:p-5 space-y-4">
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3">
                <div>
                    <h1 id="game-title" class="text-2xl md:text-4xl font-black leading-tight"></h1>
                    <p id="game-subtitle" class="font-bold opacity-90 mt-1"></p>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button id="sound-toggle" class="bg-white/20 hover:bg-white/30 text-white font-black px-4 py-2 rounded-full border border-white/30 transition">Sound Off</button>
                    <button onclick="location.reload()" class="bg-white text-gray-900 font-black px-4 py-2 rounded-full shadow hover:scale-105 active:scale-95 transition">Start Again</button>
                </div>
            </div>
            <div class="flex flex-wrap gap-2">
                <div class="stat-pill">Pairs: <span id="score-display">0</span> / <span id="total-display">0</span></div>
                <div class="stat-pill">Time: <span id="timer-display">0:00.0</span></div>
                <div class="stat-pill">Wrong: <span id="wrong-display">0</span></div>
                <div class="stat-pill">Penalty: <span id="penalty-display">+0:00.0</span></div>
                <div class="stat-pill">Best: <span id="best-display">—</span></div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-6">
        <section class="bg-white rounded-3xl shadow-xl border-4 border-white/70 overflow-hidden">
            <div class="theme-bg px-5 py-3">
                <h2 class="text-xl font-black uppercase tracking-wide">Choose two matching tiles</h2>
            </div>
            <div class="p-4 md:p-6">
                <div id="game-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
            </div>
        </section>
    </main>

    <div id="win-modal" class="fixed inset-0 modal-backdrop z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 md:p-8 max-w-lg w-full text-center shadow-2xl border-4 theme-border">
            <div class="text-7xl mb-3">🏆</div>
            <h2 class="text-4xl font-black theme-text mb-2">Great matching!</h2>
            <p class="text-lg text-gray-600 font-bold mb-5">You found all the pairs.</p>
            <div class="bg-gray-50 rounded-2xl p-4 text-left font-extrabold space-y-2 mb-6">
                <div>Raw time: <span id="final-raw-time"></span></div>
                <div>Wrong matches: <span id="final-wrong"></span></div>
                <div>Penalty: <span id="final-penalty"></span></div>
                <div class="text-2xl theme-text">Final score time: <span id="final-score-time"></span></div>
                <div>Best score: <span id="final-best"></span></div>
            </div>
            <button onclick="location.reload()" class="theme-bg w-full py-3 rounded-full text-xl font-black shadow-lg hover:scale-105 active:scale-95 transition">Play Again</button>
        </div>
    </div>

        let score = 0;
        let wrongMatches = 0;
        let selectedCards = [];
        let inputLocked = false;
        let timerStarted = false;
        let timerInterval = null;
        let startTime = 0;
        let elapsedMs = 0;
        let soundEnabled = Boolean(teacherSettings.soundEffectsOnByDefault);
        let audioContext = null;

        function applySettings() {
            document.documentElement.style.setProperty('--bg', teacherSettings.backgroundColour);
            document.documentElement.style.setProperty('--heading', teacherSettings.headingSectionColour);
            document.documentElement.style.setProperty('--heading-text', teacherSettings.headingTextColour);
            document.title = teacherSettings.gameTitle;
            document.getElementById('game-title').textContent = teacherSettings.gameTitle;
            document.getElementById('game-subtitle').textContent = teacherSettings.instructionText + ' Topic: ' + teacherSettings.categoryName;
            document.getElementById('total-display').textContent = pairData.length;
            updateSoundButton();
            updateBestDisplay();
        }

        function flattenCards() {
            return pairData.flatMap((pair, pairIndex) => pair.tiles.map((tile, tileIndex) => ({
                id: pair.pairId + '-' + tileIndex,
                pairId: pair.pairId,
                type: tile.type,
                content: tile.content,
                alt: tile.alt || ('Pair ' + (pairIndex + 1) + ' tile ' + (tileIndex + 1))
            })));
        }

        function shuffle(array) {
            return [...array].sort(() => Math.random() - 0.5);
        }

        function initGame() {
            applySettings();
            const cards = shuffle(flattenCards());
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            cards.forEach((card, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'game-card animate-pop';
                button.style.animationDelay = Math.min(index * 0.025, 0.35) + 's';
                button.dataset.id = card.id;
                button.dataset.pairId = card.pairId;
                button.setAttribute('aria-label', card.alt || card.content || 'Matching card');
                button.innerHTML = '<div class="card-inner">' + renderCardContent(card) + '</div>';
                button.addEventListener('click', () => handleCardClick(button));
                grid.appendChild(button);
            });
            updateStats();
        }

        function renderCardContent(card) {
            if (card.type === 'image') {
                return '<img class="card-image" src="' + escapeAttribute(card.content) + '" alt="' + escapeAttribute(card.alt || '') + '">';
            }
            return '<div class="card-text">' + escapeHtml(card.content) + '</div>';
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        function escapeAttribute(value) { return escapeHtml(value); }

        function handleCardClick(cardElement) {
            if (inputLocked || cardElement.classList.contains('matched')) return;
            startTimer();
            playSound('tap');

            if (selectedCards.includes(cardElement)) {
                cardElement.classList.remove('selected');
                selectedCards = selectedCards.filter(card => card !== cardElement);
                return;
            }

            if (selectedCards.length >= 2) return;
            cardElement.classList.add('selected');
            selectedCards.push(cardElement);

            if (selectedCards.length === 2) {
                checkSelectedPair();
            }
        }

        function checkSelectedPair() {
            inputLocked = true;
            const [first, second] = selectedCards;
            const isMatch = first.dataset.pairId === second.dataset.pairId;

            if (isMatch) {
                setTimeout(() => {
                    first.classList.remove('selected');
                    second.classList.remove('selected');
                    first.classList.add('matched');
                    second.classList.add('matched');
                    selectedCards = [];
                    inputLocked = false;
                    score++;
                    playSound('correct');
                    updateStats();
                    if (score === pairData.length) finishGame();
                }, 250);
            } else {
                wrongMatches++;
                first.classList.add('wrong', 'animate-shake');
                second.classList.add('wrong', 'animate-shake');
                playSound('wrong');
                updateStats();
                setTimeout(() => {
                    first.classList.remove('selected', 'wrong', 'animate-shake');
                    second.classList.remove('selected', 'wrong', 'animate-shake');
                    selectedCards = [];
                    inputLocked = false;
                }, 720);
            }
        }

        function startTimer() {
            if (timerStarted) return;
            timerStarted = true;
            startTime = performance.now();
            timerInterval = setInterval(() => {
                elapsedMs = performance.now() - startTime;
                document.getElementById('timer-display').textContent = formatTime(elapsedMs);
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            elapsedMs = timerStarted ? performance.now() - startTime : 0;
            document.getElementById('timer-display').textContent = formatTime(elapsedMs);
        }

        function getPenaltyMs() {
            return wrongMatches * Number(teacherSettings.wrongMatchPenaltySeconds || 0) * 1000;
        }

        function getFinalScoreMs() {
            return elapsedMs + getPenaltyMs();
        }

        function bestKey() {
            return 'matchPairsBest:' + teacherSettings.categoryName + ':' + pairData.length;
        }

        function updateBestDisplay() {
            const best = sessionStorage.getItem(bestKey());
            document.getElementById('best-display').textContent = best ? formatTime(Number(best)) : '—';
        }

        function finishGame() {
            stopTimer();
            const finalScore = getFinalScoreMs();
            const previousBest = sessionStorage.getItem(bestKey());
            if (!previousBest || finalScore < Number(previousBest)) {
                sessionStorage.setItem(bestKey(), String(finalScore));
            }
            updateStats();
            updateBestDisplay();
            document.getElementById('final-raw-time').textContent = formatTime(elapsedMs);
            document.getElementById('final-wrong').textContent = wrongMatches;
            document.getElementById('final-penalty').textContent = '+' + formatTime(getPenaltyMs());
            document.getElementById('final-score-time').textContent = formatTime(finalScore);
            document.getElementById('final-best').textContent = formatTime(Number(sessionStorage.getItem(bestKey())));
            document.getElementById('win-modal').classList.remove('hidden');
            document.getElementById('win-modal').classList.add('flex');
            playSound('win');
        }

        function updateStats() {
            document.getElementById('score-display').textContent = score;
            document.getElementById('wrong-display').textContent = wrongMatches;
            document.getElementById('penalty-display').textContent = '+' + formatTime(getPenaltyMs());
        }

        function formatTime(ms) {
            const totalTenths = Math.max(0, Math.floor(ms / 100));
            const minutes = Math.floor(totalTenths / 600);
            const seconds = Math.floor((totalTenths % 600) / 10);
            const tenths = totalTenths % 10;
            return minutes + ':' + String(seconds).padStart(2, '0') + '.' + tenths;
        }

        function updateSoundButton() {
            const button = document.getElementById('sound-toggle');
            button.textContent = soundEnabled ? 'Sound On' : 'Sound Off';
        }

        function playSound(type) {
            if (!soundEnabled) return;
            try {
                audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
                const now = audioContext.currentTime;
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                const soundMap = {
                    tap: [440, 0.045, 'sine'],
                    correct: [660, 0.11, 'triangle'],
                    wrong: [170, 0.14, 'sawtooth'],
                    win: [880, 0.28, 'triangle']
                };
                const [frequency, duration, wave] = soundMap[type] || soundMap.tap;
                oscillator.type = wave;
                oscillator.frequency.setValueAtTime(frequency, now);
                if (type === 'win') oscillator.frequency.exponentialRampToValueAtTime(1175, now + duration);
                gain.gain.setValueAtTime(0.001, now);
                gain.gain.exponentialRampToValueAtTime(0.18, now + 0.015);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                oscillator.start(now);
                oscillator.stop(now + duration + 0.02);
            } catch (error) {
                soundEnabled = false;
                updateSoundButton();
            }
        }

        document.getElementById('sound-toggle').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            updateSoundButton();
            if (soundEnabled) playSound('correct');
        });

        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
